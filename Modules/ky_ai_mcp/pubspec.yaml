name: ky_ai_mcp
description: Model Context Protocol (MCP) server for Ky Office suite, enabling AI agents to create, edit, and manage documents across ky_docs, ky_sheet, and ky_slide.
version: 1.0.0
homepage: https://github.com/ky-office/ky_ai_mcp

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  json_rpc_2: ^3.0.2
  stream_channel: ^2.1.2
  meta: ^1.10.0
  path: ^1.8.3
  
  # Ky Office internal dependencies
  ky_docs:
    path: ../ky_docs
  ky_sheet:
    path: ../ky_sheet
  ky_slide:
    path: ../ky_slide
  ky_ai_core:
    path: ../ky_ai_core

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  test: ^1.24.9

flutter:
  uses-material-design: true
