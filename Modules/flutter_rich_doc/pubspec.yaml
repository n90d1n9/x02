name: rich_doc_flutter
description: >
  Flutter rendering + editing layer for rich_doc_core, a Rust-backed
  rich-text document engine with a fully custom, app-controlled schema.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  flutter_rust_bridge: ^2.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  # No assets/plugins of our own; this package is pure Dart + FFI glue.
