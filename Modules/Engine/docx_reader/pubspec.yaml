name: docx_reader
description: DOCX/DOC file parser and reader engine for Ky Office. Parses Office Open XML format.
version: 1.0.0
homepage: https://kyoffice.dev

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  office_common:
    path: ../office_common
  office_core:
    path: ../office_core
  office_multimedia:
    path: ../office_multimedia
  archive: ^3.4.10
  xml: ^6.5.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: false