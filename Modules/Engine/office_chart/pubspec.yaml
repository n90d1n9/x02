name: office_chart
description: Chart rendering engine (bar, line, pie, area, radar, scatter) for Ky Office Engine.
version: 1.0.0
homepage: https://kyoffice.dev

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  office_common:
    path: ../office_common
  office_core:
    path: ../office_core
  fl_chart: ^0.65.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: false