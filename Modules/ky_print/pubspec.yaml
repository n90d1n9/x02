name: ky_print
description: A reusable print service plugin for Ky Office suite (ky_docs, ky_sheet, ky_slide). Supports cross-platform printing with preview, page layout, and print settings.
version: 1.0.0
homepage: https://github.com/your-org/ky_office

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  printing: ^5.12.0
  pdf: ^3.10.7
  path_provider: ^2.1.1
  path: ^1.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true